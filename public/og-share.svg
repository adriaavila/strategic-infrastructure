  <text x="304" y="198" fill="#6B6477" font-family="'IBM Plex Mono', monospace" font-size="18" letter-spacing="0.24em">INSTALAMOS EMPLEADOS DIGITALES PARA EMPRESAS</text>

  <text x="88" y="340" fill="#11131B" font-family="'Syne', sans-serif" font-size="76" font-weight="700" letter-spacing="-0.05em">Sistemas con IA para ventas,</text>
  <text x="88" y="422" fill="#5C4CD0" font-family="'Syne', sans-serif" font-size="76" font-weight="700" letter-spacing="-0.05em">soporte y operaciones.</text>
  <text x="88" y="504" fill="#4C4954" font-family="'IBM Plex Sans', sans-serif" font-size="28">Automatizaciones, agentes y workflows conectados a la operacion real.</text>

